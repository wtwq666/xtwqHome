<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xtwqHome - Vercel 部署示例</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 xtwqHome</h1>
      <p class="subtitle">成功部署在 Vercel 上的纯前端项目示例</p>
    </header>

    <main>
      <section class="card">
        <h2>项目简介</h2>
        <p>这是一个用于学习 Git 工作流与前端部署的实验仓库。</p>
        <p>当前页面由纯 HTML + CSS + JavaScript 构成，Vercel 会自动识别为静态网站并托管。</p>
      </section>

      <section class="card">
        <h2>快速入口</h2>
        <div class="links">
          <a href="./stu_docs/git-guide.html" class="btn">📖 Git 操作指南</a>
          <a href="./nav-demo.html" class="btn">🧭 导航模块演示</a>
        </div>
      </section>

      <section class="card interactive">
        <h2>交互演示</h2>
        <p>点击下方按钮，体验前端 JavaScript 在浏览器中的执行效果：</p>
        <button id="clickBtn" class="btn primary">点我计数</button>
        <p class="counter">当前点击次数：<span id="count">0</span></p>
      </section>
    </main>

    <footer>
      <p>Made by wtwq666 · Deployed on Vercel</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
